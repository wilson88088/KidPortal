<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kid Portal</title>
  <style>
    :root {
      --sky: #dff4ff;
      --mint: #dff8ea;
      --peach: #ffe7cf;
      --sun: #ffd75e;
      --ink: #23415e;
      --pink: #ff8db1;
      --blue: #61b8ff;
      --green: #64d39b;
      --card-shadow: 0 18px 40px rgba(35, 65, 94, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.7), transparent 25%),
        linear-gradient(180deg, #84d8ff 0%, #b9ebff 30%, #fff3bf 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: 0;
      border-radius: 999px;
      opacity: 0.4;
      pointer-events: none;
    }

    body::before {
      width: 220px;
      height: 220px;
      top: 80px;
      left: -60px;
      background: #ffffff;
      filter: blur(8px);
    }

    body::after {
      width: 320px;
      height: 320px;
      right: -100px;
      bottom: 40px;
      background: rgba(255, 255, 255, 0.55);
      filter: blur(14px);
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 56px;
    }

    .hero {
      text-align: center;
      padding: 18px 18px 28px;
      animation: float-in 0.8s ease-out;
    }

    .hero-badge {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 10px 24px rgba(35, 65, 94, 0.08);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: clamp(2.2rem, 5vw, 4.2rem);
      line-height: 1.05;
    }

    .hero p {
      width: min(640px, 100%);
      margin: 0 auto;
      font-size: clamp(1rem, 2.4vw, 1.2rem);
      line-height: 1.8;
    }

    .sparkles {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 20px;
    }

    .sparkles span {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      animation: bob 2.2s ease-in-out infinite;
    }

    .sparkles span:nth-child(1) { background: var(--pink); }
    .sparkles span:nth-child(2) { background: var(--sun); animation-delay: 0.2s; }
    .sparkles span:nth-child(3) { background: var(--blue); animation-delay: 0.4s; }
    .sparkles span:nth-child(4) { background: var(--green); animation-delay: 0.6s; }

    .portal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      margin-top: 20px;
    }

    .portal-card {
      position: relative;
      display: block;
      padding: 26px;
      border-radius: 28px;
      color: inherit;
      text-decoration: none;
      box-shadow: var(--card-shadow);
      overflow: hidden;
      transform: translateY(22px);
      opacity: 0;
      animation: rise-up 0.7s ease-out forwards;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .portal-card:nth-child(2) { animation-delay: 0.12s; }
    .portal-card:nth-child(3) { animation-delay: 0.24s; }
    .portal-card:nth-child(4) { animation-delay: 0.36s; }

    .portal-card:hover,
    .portal-card:focus-visible {
      transform: translateY(-8px) rotate(-1deg);
      box-shadow: 0 24px 42px rgba(35, 65, 94, 0.2);
      outline: none;
    }

    .portal-card::before {
      content: "";
      position: absolute;
      inset: auto -30px -40px auto;
      width: 120px;
      height: 120px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.35);
      transform: rotate(25deg);
    }

    .card-reading { background: linear-gradient(145deg, #ffffff, var(--sky)); }
    .card-chinese { background: linear-gradient(145deg, #fff7df, var(--peach)); }
    .card-bilingual { background: linear-gradient(145deg, #ffffff, #e6f7ff); }
    .card-tasks { background: linear-gradient(145deg, #f7fff8, var(--mint)); }

    .icon {
      font-size: 3rem;
      line-height: 1;
    }

    .portal-card h2 {
      margin: 16px 0 10px;
      font-size: clamp(1.45rem, 2.8vw, 2rem);
    }

    .portal-card p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.75;
      max-width: 34ch;
    }

    .go {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      font-weight: 700;
    }

    .footer-note {
      text-align: center;
      margin-top: 26px;
      font-size: 0.95rem;
      opacity: 0.82;
    }

    @keyframes rise-up {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes float-in {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @media (max-width: 820px) {
      .portal-grid {
        grid-template-columns: 1fr;
      }

      .page {
        width: min(100% - 20px, 680px);
        padding-top: 20px;
      }

      .portal-card {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-badge">Kid Learning Portal</div>
      <h1>今天想先玩哪一個學習任務？</h1>
      <p>
        這裡是小朋友的學習入口站，點一下卡片就可以開始閱讀、學中文字、練習中英文，或安排今天的任務。
      </p>
      <div class="sparkles" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </section>

    <section class="portal-grid" aria-label="學習工具入口">
      <a class="portal-card card-reading" href="https://wilson88088.github.io/KidReadStatusDetectionTool/" target="_blank" rel="noopener noreferrer">
        <div class="icon" aria-hidden="true">📚</div>
        <h2>閱讀狀態偵測</h2>
        <p>看看現在的閱讀進度與狀態，幫助孩子更清楚知道自己完成到哪裡。</p>
        <span class="go">開始探索 →</span>
      </a>

      <a class="portal-card card-chinese" href="https://wilson88088.github.io/KidLearnChineseWord/" target="_blank" rel="noopener noreferrer">
        <div class="icon" aria-hidden="true">✍️</div>
        <h2>學習中文字</h2>
        <p>透過有趣的方式認識中文字，練習閱讀、記憶和理解常用詞語。</p>
        <span class="go">一起學習 →</span>
      </a>

      <a class="portal-card card-bilingual" href="https://wilson88088.github.io/ReadBuddy/" target="_blank" rel="noopener noreferrer">
        <div class="icon" aria-hidden="true">🌏</div>
        <h2>中英文閱讀練習</h2>
        <p>切換中文與英文的閱讀練習，讓孩子一步一步建立雙語閱讀信心。</p>
        <span class="go">開始閱讀 →</span>
      </a>

      <a class="portal-card card-tasks" href="https://wilson88088.github.io/task-hero/" target="_blank" rel="noopener noreferrer">
        <div class="icon" aria-hidden="true">⭐</div>
        <h2>任務安排</h2>
        <p>把今天要做的事情排好順序，完成任務就像闖關一樣有成就感。</p>
        <span class="go">前往安排 →</span>
      </a>
    </section>

    <p class="footer-note">選一張卡片出發吧，每天進步一點點。</p>
  </main>
</body>
</html>
